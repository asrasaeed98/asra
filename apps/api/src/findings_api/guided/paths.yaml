# Curated explore paths — smoke-test each pair before adding (ingest → join → analyze).
# Used by GET /guided/suggest and to boost search ranking for featured resources.

topics:
  - id: economy
    title: Economy & growth
    description: GDP, trade, employment, and prices
    icon: chart
  - id: health
    title: Health & longevity
    description: Life expectancy, mortality, and healthcare access
    icon: heart
  - id: environment
    title: Environment & energy
    description: Emissions, forest cover, and energy access
    icon: leaf
  - id: education
    title: Education & skills
    description: Literacy, enrollment, and internet access
    icon: book
  - id: poverty
    title: Poverty & inequality
    description: Poverty rates and economic development
    icon: scale

paths:
  - id: wealth-health
    title: Wealth and health across countries
    topic: health
    quality: verified
    description: Compare GDP per capita with life expectancy by country and year — a classic development economics relationship.
    user_intent: Explore whether wealthier countries tend to have longer life expectancy.
    question_patterns:
      - life expectancy
      - wealth and health
      - gdp and health
      - rich countries live longer
      - income and longevity
    resource_ids:
      - wb:NY.GDP.PCAP.CD
      - wb:SP.DYN.LE00.IN
    join_hint:
      - { left: countryiso3code, right: countryiso3code }
      - { left: date, right: date }
    why: Standard World Bank country-year panels; joins cleanly on country and year.

  - id: energy-access
    title: Electricity and clean cooking access
    topic: environment
    quality: verified
    description: Countries with more electricity access often have higher clean-fuel adoption for cooking.
    user_intent: Explore how electricity access relates to clean cooking fuel access across countries.
    question_patterns:
      - electricity
      - clean fuels
      - energy access
      - cooking fuel
    resource_ids:
      - wb:EG.ELC.ACCS.ZS
      - wb:EG.CFT.ACCS.ZS
    join_hint:
      - { left: countryiso3code, right: countryiso3code }
      - { left: date, right: date }
    why: Both are World Bank country-year percentage indicators with matching geography.

  - id: poverty-gdp
    title: Poverty and GDP per capita
    topic: poverty
    quality: verified
    description: See how extreme poverty rates relate to national income levels.
    user_intent: Explore the relationship between GDP per capita and extreme poverty rates.
