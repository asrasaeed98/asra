  - id: us-gdp-unemployment
    title: US GDP and unemployment
    topic: economy
    quality: good
    description: Pair US gross domestic product with the unemployment rate by date.
    user_intent: Explore how US GDP and unemployment move together over time.
    question_patterns:
      - gdp unemployment
      - economy and jobs
      - recession indicators
    resource_ids:
      - fred:GDP
      - fred:UNRATE
    join_hint:
      - { left: date, right: date }
    why: Both are US national FRED series — join on observation date only.
