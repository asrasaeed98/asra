      - extreme poverty
      - gdp and poverty
    resource_ids:
      - wb:NY.GDP.PCAP.CD
      - wb:SI.POV.DDAY
    join_hint:
      - { left: countryiso3code, right: countryiso3code }
      - { left: date, right: date }
    why: Macro indicators on the same country-year panel.

  - id: literacy-internet
    title: Literacy and internet use
    topic: education
    quality: verified
    description: Compare adult literacy with the share of people using the internet.
    user_intent: Explore whether countries with higher literacy also have more internet users.
